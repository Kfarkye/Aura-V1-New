<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>AURA Tooling Dashboard</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; z-index:9999; top:0; left:0; width:100%; padding:20px; font-family:monospace; display:block;"><h2>GLOBAL ERROR:</h2><pre>' + e.message + '\n' + e.filename + ':' + e.lineno + '</pre></div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
